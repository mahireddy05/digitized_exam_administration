{% extends "core/base_admin.html" %}
{% load static %}
{% block content %}
<div class="pages-main">
    <h1 class="pages-main-head">Add New Course</h1>
    <div class="management-form">
        <form method="post">
            {% csrf_token %}
            <p>Course Code: <input type="text" name="course_code" value="" required /></p>
            <p>Course Name: <input type="text" name="course_name" value="" required /></p>
            <p>Status: <input type="checkbox" name="is_active" value="1" checked /> Active</p>
            <button type="submit">Save</button>
        </form>
        <a href="{% url 'masters:courses' %}" class="action-link">Back to Course List</a>
    </div>
</div>
{% endblock %}
